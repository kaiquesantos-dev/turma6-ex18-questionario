<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Responder Formulário</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="topo">
    <a class="topo-marca" href="index.html">📋 Questionários</a>
    <nav class="topo-nav">
      <a href="perguntas.html">Perguntas</a>
      <a href="formularios.html">Formulários</a>
      <a href="respostas.html">Respostas</a>
    </nav>
  </header>

  <main class="container">
    <section class="painel">
      <h2 id="tituloFormulario">Carregando...</h2>
      <p id="descricaoFormulario"></p>

      <div id="barraProgressoWrap" class="barra-progresso-wrap oculto">
        <span id="progressoTexto" class="barra-progresso-texto"></span>
        <div class="barra-progresso-fundo">
          <div id="progressoFill" class="barra-progresso-preenchida"></div>
        </div>
      </div>

      <form id="formResposta">
        <h3 class="subtitulo-form">Seus dados</h3>
        <label for="nome">Nome <span class="obrigatorio-marca">*</span></label>
        <input type="text" id="nome" required>

        <label for="email">E-mail <span class="obrigatorio-marca">*</span></label>
        <input type="email" id="email" required>

        <h3 class="subtitulo-form">Perguntas</h3>
        <div id="perguntasFormulario"></div>

        <div class="acoes-form">
          <button type="submit" id="btnEnviarResposta">Enviar</button>
        </div>

        <p id="erroResposta" class="erro"></p>
        <p id="sucessoResposta" class="sucesso"></p>
      </form>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/api.js"></script>
  <script src="../js/responder.js"></script>
</body>
</html>
