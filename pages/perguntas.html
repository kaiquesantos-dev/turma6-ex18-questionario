<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Perguntas</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="topo">
    <a class="topo-marca" href="index.html">📋 Questionários</a>
    <nav class="topo-nav">
      <a href="perguntas.html" class="ativo">Perguntas</a>
      <a href="formularios.html">Formulários</a>
      <a href="respostas.html">Respostas</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="titulo-pagina">Perguntas</h1>

    <section class="painel">
      <h2 id="tituloFormPergunta">Nova pergunta</h2>
      <form id="formPergunta">
        <input type="hidden" id="perguntaId">

        <h3 class="subtitulo-form">Detalhes da pergunta</h3>
        <label for="enunciado">Enunciado <span class="obrigatorio-marca">*</span></label>
        <input type="text" id="enunciado" required>

        <label for="tipo">Tipo <span class="obrigatorio-marca">*</span></label>
        <select id="tipo" required>
          <option value="">Selecione...</option>
          <option value="multipla_escolha">Múltipla escolha</option>
          <option value="checkbox">Checkbox</option>
          <option value="texto_curto">Texto curto</option>
          <option value="texto_longo">Texto longo</option>
        </select>

        <label class="linha-checkbox">
          <input type="checkbox" id="obrigatoria">
          Pergunta obrigatória
        </label>

        <div id="blocoAlternativas" class="oculto">
          <h3 class="subtitulo-form">Alternativas</h3>
          <div id="listaAlternativas"></div>
          <button type="button" id="btnAddAlternativa">+ Adicionar alternativa</button>
        </div>

        <div class="acoes-form">
          <button type="submit" id="btnSalvarPergunta">Salvar</button>
          <button type="button" id="btnCancelarEdicao" class="secundario oculto">Cancelar edição</button>
        </div>

        <p id="erroPergunta" class="erro"></p>
      </form>
    </section>

    <section class="painel">
      <h2>Perguntas cadastradas</h2>
      <div class="tabela-scroll">
        <table id="tabelaPerguntas">
          <thead>
            <tr>
              <th>Enunciado</th>
              <th>Tipo</th>
              <th>Obrigatória</th>
              <th>Alternativas</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaPerguntas"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/api.js"></script>
  <script src="../js/perguntas.js"></script>
</body>
</html>
