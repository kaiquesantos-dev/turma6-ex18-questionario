<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Formulários</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="topo">
    <a class="topo-marca" href="index.html">📋 Questionários</a>
    <nav class="topo-nav">
      <a href="perguntas.html">Perguntas</a>
      <a href="formularios.html" class="ativo">Formulários</a>
      <a href="respostas.html">Respostas</a>
    </nav>
  </header>

  <main class="container">
    <h1 class="titulo-pagina">Formulários</h1>

    <section class="painel">
      <h2 id="tituloFormFormulario">Novo formulário</h2>
      <form id="formFormulario">
        <input type="hidden" id="formularioId">

        <h3 class="subtitulo-form">Informações gerais</h3>
        <label for="titulo">Título <span class="obrigatorio-marca">*</span></label>
        <input type="text" id="titulo" required>

        <label for="descricao">Descrição</label>
        <textarea id="descricao"></textarea>

        <h3 class="subtitulo-form">Publicação</h3>
        <label for="status">Status</label>
        <select id="status">
          <option value="rascunho">Rascunho</option>
          <option value="publicado">Publicado</option>
          <option value="encerrado">Encerrado</option>
        </select>

        <div class="linha-dupla">
          <div>
            <label for="dataInicio">Data início</label>
            <input type="date" id="dataInicio">
          </div>
          <div>
            <label for="dataFim">Data fim</label>
            <input type="date" id="dataFim">
          </div>
        </div>

        <h3 class="subtitulo-form">Perguntas <span class="obrigatorio-marca">*</span></h3>
        <div id="listaPerguntasDisponiveis" class="lista-selecao"></div>

        <div class="acoes-form">
          <button type="submit" id="btnSalvarFormulario">Salvar</button>
          <button type="button" id="btnCancelarEdicaoFormulario" class="secundario oculto">Cancelar edição</button>
        </div>

        <p id="erroFormulario" class="erro"></p>
      </form>
    </section>

    <section class="painel">
      <h2>Formulários cadastrados</h2>
      <div class="tabela-scroll">
        <table id="tabelaFormularios">
          <thead>
            <tr>
              <th>Título</th>
              <th>Status</th>
              <th>Perguntas</th>
              <th>Vigência</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="corpoTabelaFormularios"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../js/api.js"></script>
  <script src="../js/formularios.js"></script>
</body>
</html>
